# =============================================================================
# PHAI — server block nginx di RIFERIMENTO (versionato).
# Questo è ciò che setup-domain.sh genera in fase 2 (HTTPS valido).
# NON va copiato a mano: lo crea lo script. È qui solo per revisione/storico.
# Sostituisci TUO.DOMINIO col dominio reale. Instrada per server_name, quindi
# convive con gli altri siti della VPS (ai-act, move, packi-v2, trading-dashboard).
# =============================================================================
map $http_upgrade $phai_conn_upgrade { default upgrade; '' close; }

server {            # HTTP -> redirect a HTTPS (+ rinnovo ACME)
    listen 80;
    listen [::]:80;
    server_name TUO.DOMINIO;
    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$host$request_uri; }
}

server {            # HTTPS -> app PHAI su 127.0.0.1:8090
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name TUO.DOMINIO;

    ssl_certificate     /etc/letsencrypt/live/TUO.DOMINIO/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/TUO.DOMINIO/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    # add_header Strict-Transport-Security "max-age=31536000" always;

    access_log /var/log/nginx/phai-access.log;
    error_log  /var/log/nginx/phai-error.log;

    location / {
        proxy_pass http://127.0.0.1:8090;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $phai_conn_upgrade;   # WebSocket /ws
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;   # risposte LLM lunghe
        proxy_buffering off;       # streaming SSE della chat
    }
}
