<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>PAPP EA — Accesso</title>
<link rel="manifest" href="/manifest.webmanifest">
<meta name="theme-color" content="#0d0f14">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="PAPP EA">
<link rel="apple-touch-icon" href="/static/apple-touch-icon.png">
<link rel="icon" type="image/png" href="/static/icon-192.png">
<style>
:root{--bg:#0d0f14;--panel:#161922;--border:#262b36;--text:#e6e8ec;--muted:#8a909c;--accent:#4fc3f7;--red:#f87171}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;background:
  radial-gradient(900px 500px at 50% -10%,rgba(79,195,247,.10),transparent),var(--bg);
  color:var(--text);min-height:100vh;min-height:100dvh;display:flex;align-items:center;justify-content:center;
  padding:max(16px,env(safe-area-inset-top)) 16px max(16px,env(safe-area-inset-bottom));-webkit-text-size-adjust:100%}
.card{background:var(--panel);border:1px solid var(--border);border-radius:18px;padding:32px 30px;width:min(360px,100%);box-shadow:0 24px 60px rgba(0,0,0,.4)}
@media(max-width:420px){.card{padding:26px 20px}}
.brand{display:flex;align-items:center;justify-content:center;gap:9px;font-weight:700;font-size:20px;margin-bottom:4px}
.brand .dot{width:10px;height:10px;border-radius:50%;background:var(--accent);box-shadow:0 0 12px var(--accent)}
.brand b{color:var(--accent)}
.sub{font-size:13px;color:var(--muted);text-align:center;margin-bottom:24px}
.tabs{display:flex;background:#11141b;border:1px solid var(--border);border-radius:10px;padding:4px;margin-bottom:20px}
.tab{flex:1;padding:9px;text-align:center;cursor:pointer;font-size:13px;font-weight:600;color:var(--muted);border-radius:7px;transition:.15s}
.tab.active{background:var(--accent);color:#0a0d12}
input{width:100%;padding:12px 14px;margin-bottom:11px;border-radius:10px;border:1px solid var(--border);background:#11141b;color:var(--text);font-size:16px;outline:none;transition:.15s}
input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(79,195,247,.12)}
button{width:100%;padding:13px;border-radius:10px;border:none;background:var(--accent);color:#0a0d12;font-weight:700;cursor:pointer;font-size:15px;transition:.15s;margin-top:3px}
button:hover{filter:brightness(1.08)}button:disabled{opacity:.5;cursor:not-allowed}
.err{color:var(--red);font-size:13px;margin-bottom:11px;min-height:18px;text-align:center}
.lic{display:none}
.disclaimer{font-size:11px;color:#565d6a;margin-top:18px;text-align:center;line-height:1.5}
</style>
</head>
<body>
<div class="card">
  <div class="brand"><span class="dot"></span>PAPP <b>EA</b></div>
  <div class="sub">Monitor &amp; assistente — accesso riservato</div>
  <div class="tabs">
    <div class="tab active" id="tab-login" onclick="setMode('login')">Accedi</div>
    <div class="tab" id="tab-register" onclick="setMode('register')">Registrati</div>
  </div>
  <div class="err" id="err"></div>
  <input type="email" id="email" placeholder="Email" autocomplete="username"/>
  <input type="password" id="password" placeholder="Password" autocomplete="current-password"/>
  <input type="text" id="license" class="lic" placeholder="License key (es. PAPP-XXXXX-…)"/>
  <button id="submit" onclick="submitForm()">Accedi</button>
  <div class="disclaimer">Strumento informativo. Non costituisce consulenza finanziaria.</div>
</div>
<script>
let mode='login'; const err=document.getElementById('err');
function setMode(m){
  mode=m;
  document.getElementById('tab-login').classList.toggle('active',m==='login');
  document.getElementById('tab-register').classList.toggle('active',m==='register');
  document.getElementById('license').style.display=m==='register'?'block':'none';
  document.getElementById('submit').textContent=m==='register'?'Registrati':'Accedi';
  err.textContent='';
}
async function submitForm(){
  err.textContent='';
  const btn=document.getElementById('submit');
  const email=document.getElementById('email').value.trim();
  const password=document.getElementById('password').value;
  const license_key=document.getElementById('license').value.trim();
  if(!email||!password){err.textContent='Inserisci email e password';return;}
  btn.disabled=true;
  try{
    const body=mode==='register'?{email,password,license_key}:{email,password};
    const r=await fetch('/api/'+mode,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    const d=await r.json();
    if(r.ok&&d.ok){location.href='/';}
    else{err.textContent=d.error||'Errore';btn.disabled=false;}
  }catch(e){err.textContent='Errore di rete';btn.disabled=false;}
}
['password','license'].forEach(id=>document.getElementById(id).addEventListener('keydown',e=>{if(e.key==='Enter')submitForm()}));
if('serviceWorker' in navigator){addEventListener('load',()=>navigator.serviceWorker.register('/sw.js').catch(()=>{}));}
</script>
</body>
</html>
