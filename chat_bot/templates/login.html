<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PAPP EA — Accesso</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,sans-serif;background:#111;color:#e0e0e0;height:100vh;display:flex;align-items:center;justify-content:center}
.card{background:#16161e;border:1px solid #333;border-radius:10px;padding:28px;width:340px}
h1{font-size:20px;color:#4fc3f7;margin-bottom:4px;text-align:center}
.sub{font-size:12px;color:#888;text-align:center;margin-bottom:20px}
.tabs{display:flex;margin-bottom:18px;border-bottom:1px solid #333}
.tab{flex:1;padding:8px;text-align:center;cursor:pointer;font-size:13px;color:#888}
.tab.active{color:#4fc3f7;border-bottom:2px solid #4fc3f7}
input{width:100%;padding:10px;margin-bottom:10px;border-radius:6px;border:1px solid #333;background:#222;color:#e0e0e0;font-size:14px}
button{width:100%;padding:11px;border-radius:6px;border:none;background:#4fc3f7;color:#111;font-weight:600;cursor:pointer;font-size:14px}
button:disabled{opacity:.5;cursor:not-allowed}
.err{color:#ef9a9a;font-size:13px;margin-bottom:10px;min-height:18px}
.lic{display:none}
.disclaimer{font-size:11px;color:#555;margin-top:16px;text-align:center;line-height:1.4}
</style>
</head>
<body>
<div class="card">
  <h1>PAPP EA Monitor</h1>
  <div class="sub">Accesso riservato ai possessori dell'EA</div>
  <div class="tabs">
    <div class="tab active" id="tab-login" onclick="setMode('login')">Accedi</div>
    <div class="tab" id="tab-register" onclick="setMode('register')">Registrati</div>
  </div>
  <div class="err" id="err"></div>
  <input type="email" id="email" placeholder="Email" autocomplete="username" />
  <input type="password" id="password" placeholder="Password" autocomplete="current-password" />
  <input type="text" id="license" class="lic" placeholder="License key (es. PAPP-XXXXX-...)" />
  <button id="submit" onclick="submitForm()">Accedi</button>
  <div class="disclaimer">Strumento informativo. Non costituisce consulenza finanziaria.</div>
</div>
<script>
let mode = 'login';
const err = document.getElementById('err');
function setMode(m){
  mode = m;
  document.getElementById('tab-login').classList.toggle('active', m==='login');
  document.getElementById('tab-register').classList.toggle('active', m==='register');
  document.getElementById('license').style.display = m==='register' ? 'block' : 'none';
  document.getElementById('submit').textContent = m==='register' ? 'Registrati' : 'Accedi';
  err.textContent = '';
}
async function submitForm(){
  err.textContent = '';
  const btn = document.getElementById('submit');
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const license_key = document.getElementById('license').value.trim();
  if(!email || !password){ err.textContent = 'Inserisci email e password'; return; }
  btn.disabled = true;
  try{
    const body = mode==='register' ? {email,password,license_key} : {email,password};
    const r = await fetch('/api/'+mode, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body)});
    const d = await r.json();
    if(r.ok && d.ok){ location.href = '/'; }
    else { err.textContent = d.error || 'Errore'; btn.disabled = false; }
  }catch(e){ err.textContent = 'Errore di rete'; btn.disabled = false; }
}
document.getElementById('password').addEventListener('keydown', e=>{if(e.key==='Enter') submitForm()});
document.getElementById('license').addEventListener('keydown', e=>{if(e.key==='Enter') submitForm()});
</script>
</body>
</html>
