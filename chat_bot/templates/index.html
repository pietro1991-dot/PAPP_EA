<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>PHAI Trading — Monitor</title>
<link rel="manifest" href="/manifest.webmanifest">
<meta name="theme-color" content="#0a0e18">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="PHAI">
<link rel="apple-touch-icon" href="/static/apple-touch-icon.png">
<link rel="icon" type="image/png" href="/static/icon-192.png">
<style>
:root{
  --bg:#0a0e18; --panel:#121829; --panel2:#1a2236; --border:#283149;
  --text:#e9ebf2; --muted:#8b94ab; --accent:#cba65c;
  --green:#3ddc97; --red:#f1707b;
}
*{margin:0;padding:0;box-sizing:border-box}
[hidden]{display:none!important}
html,body{height:100%}
body{font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;background:var(--bg);color:var(--text);display:flex;flex-direction:column;height:100vh;height:100dvh;overflow:hidden;-webkit-text-size-adjust:100%}
.messages,.signal-list,.tabs{-webkit-overflow-scrolling:touch}
::-webkit-scrollbar{width:9px;height:9px}
::-webkit-scrollbar-thumb{background:#2c3450;border-radius:5px}
::-webkit-scrollbar-thumb:hover{background:#3a4564}
::-webkit-scrollbar-track{background:transparent}

/* ---------- Header ---------- */
header{background:linear-gradient(180deg,#101627,#0a0e18);border-bottom:1px solid var(--border);padding:0 18px;padding-left:max(18px,env(safe-area-inset-left));padding-right:max(18px,env(safe-area-inset-right));display:flex;align-items:center;gap:18px;height:54px;flex-shrink:0}
.brand{display:flex;align-items:center;gap:10px}
.brand-mark{width:32px;height:32px;display:block;flex-shrink:0}
.brand-name{display:flex;flex-direction:column;line-height:1;font-weight:800;font-size:16px;letter-spacing:2px;color:var(--text)}
.brand-name i{font-style:normal;font-size:8.5px;letter-spacing:3.5px;color:var(--accent);font-weight:700;margin-top:3px}
.tabs{display:flex;gap:6px;flex:1;overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{display:flex;align-items:center;gap:7px;padding:7px 14px;border-radius:20px;background:#1a2236;border:1px solid var(--border);color:var(--muted);font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;transition:.15s}
.tab:hover{background:#232d46;color:var(--text)}
.tab.active{background:var(--accent);border-color:var(--accent);color:#0a0e18}
.tab .tdot{width:7px;height:7px;border-radius:50%;background:currentColor;opacity:.85}
.user{display:flex;align-items:center;gap:12px;font-size:13px;color:var(--muted);flex-shrink:0}
.user .email{max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.user .logout{cursor:pointer;color:var(--accent);font-weight:600}
.user .logout:hover{text-decoration:underline}
.lang-sel{background:#1a2236;color:var(--text);border:1px solid var(--border);border-radius:8px;padding:6px 7px;font-size:12px;font-weight:600;cursor:pointer;outline:none;flex-shrink:0}
.lang-sel:hover{border-color:var(--accent)}
.install-btn{padding:6px 12px;border-radius:8px;border:1px solid var(--accent);background:transparent;color:var(--accent);font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap}
.install-btn:hover{background:rgba(203,166,92,.12)}
.notif-btn{width:34px;height:34px;border-radius:8px;border:1px solid var(--border);background:#1a2236;color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.15s;flex-shrink:0}
.notif-btn:hover{color:var(--text);border-color:#3a4564}
.notif-btn.on{color:var(--accent);border-color:var(--accent);background:rgba(203,166,92,.12)}
.toasts{position:fixed;top:64px;right:14px;right:max(14px,env(safe-area-inset-right));display:flex;flex-direction:column;gap:8px;z-index:60;max-width:min(330px,90vw)}
.toast{background:var(--panel2);border:1px solid var(--border);border-left:3px solid var(--accent);border-radius:10px;padding:11px 14px;box-shadow:0 10px 28px rgba(0,0,0,.45);animation:rise .2s}
.toast .tt{font-weight:700;font-size:13px}
.toast .tb{font-size:12px;color:var(--muted);margin-top:2px;line-height:1.4}

/* ---------- Stat cards ---------- */
.cards{display:flex;gap:12px;padding:14px 18px 0;flex-shrink:0}
.cards.stats-row{padding-top:10px;padding-bottom:4px}
.card{flex:1;background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:12px 16px;min-width:0}
.cards.account .card{background:linear-gradient(180deg,#161e30,#121829)}
.card.sm{padding:9px 14px}
.card-label{font-size:11px;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);margin-bottom:5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-val{font-size:23px;font-weight:700;line-height:1}
.card.sm .card-val{font-size:19px}
.card-val.pos{color:var(--green)} .card-val.neg{color:var(--red)}
.card-val.accent{color:var(--accent)}
.tab .pct{font-size:11px;font-weight:700;opacity:.95}
.tab .pct.pos{color:var(--green)} .tab .pct.neg{color:var(--red)}
.tab.active .pct.pos,.tab.active .pct.neg{color:#0a0e18}

/* ---------- Layout ---------- */
.container{display:flex;flex:1;gap:14px;padding:0 18px 16px;overflow:hidden}
.panel{background:var(--panel);border:1px solid var(--border);border-radius:14px;display:flex;flex-direction:column;overflow:hidden}
.chat-panel{flex:1}
.signals-panel{flex:1}
.panel-head{padding:13px 16px;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--muted);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.panel-head .scope{color:var(--accent)}
.live{margin-left:auto;display:flex;align-items:center;gap:6px;font-size:10px;color:var(--green);text-transform:none;letter-spacing:0}
.live .pulse{width:7px;height:7px;border-radius:50%;background:var(--green);animation:pulse 1.6s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* ---------- Chat ---------- */
.messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px}
.msg{max-width:88%;padding:11px 14px;border-radius:14px;font-size:14px;line-height:1.55;animation:rise .2s ease}
@keyframes rise{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.msg.user{background:linear-gradient(135deg,#22324f,#1a2740);align-self:flex-end;border-bottom-right-radius:4px}
.msg.bot{background:var(--panel2);align-self:flex-start;border:1px solid var(--border);border-bottom-left-radius:4px;color:#dfe2e7}
.msg.bot .who{font-weight:700;color:var(--accent);font-size:12px;display:block;margin-bottom:4px}
.msg.bot strong{color:var(--accent)}
.msg.bot .md-h{font-weight:700;color:var(--accent);margin:9px 0 3px;font-size:14px}
.msg.bot p{margin:6px 0}.msg.bot p:first-child,.msg.bot .md-h:first-child{margin-top:0}
.msg.bot ul,.msg.bot ol{margin:6px 0 6px 20px}.msg.bot li{margin:3px 0}
.msg.bot code{background:#0e1422;padding:1px 6px;border-radius:4px;font-size:13px}
.msg.bot table{border-collapse:collapse;margin:8px 0;font-size:13px;display:block;overflow-x:auto}
.msg.bot th,.msg.bot td{border:1px solid var(--border);padding:5px 10px;text-align:left;white-space:nowrap}
.msg.bot th{background:#0e1422;color:var(--accent)}
.typing{display:inline-flex;gap:4px;padding:2px 0}
.typing i{width:7px;height:7px;border-radius:50%;background:var(--muted);animation:blink 1.2s infinite}
.typing i:nth-child(2){animation-delay:.2s}.typing i:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,60%,100%{opacity:.25}30%{opacity:1}}
.input-bar{display:flex;padding:12px;padding-bottom:max(12px,env(safe-area-inset-bottom));gap:10px;border-top:1px solid var(--border)}
.input-bar input{flex:1;padding:12px 14px;border-radius:10px;border:1px solid var(--border);background:#0e1422;color:var(--text);font-size:14px;outline:none;transition:.15s}
.input-bar input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(203,166,92,.12)}
.input-bar button{padding:12px 22px;border-radius:10px;border:none;background:var(--accent);color:#0a0e18;font-weight:700;cursor:pointer;font-size:14px;transition:.15s}
.input-bar button:hover{filter:brightness(1.08)}
.input-bar button:disabled{opacity:.4;cursor:not-allowed}
.mic-btn{padding:0!important;width:44px;height:44px;flex-shrink:0;border-radius:10px!important;border:1px solid var(--border)!important;background:#0e1422!important;color:var(--muted)!important;display:flex;align-items:center;justify-content:center}
.mic-btn:hover{filter:none!important;color:var(--text)!important;border-color:#3a4564!important}
.mic-btn.rec{color:#fff!important;background:var(--red)!important;border-color:var(--red)!important;animation:micpulse 1.3s infinite}
@keyframes micpulse{0%,100%{box-shadow:0 0 0 0 rgba(248,113,113,.5)}50%{box-shadow:0 0 0 9px rgba(248,113,113,0)}}

/* ---------- Signals ---------- */
.signal-list{flex:1;overflow-y:auto;padding:8px}
.sig{display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:10px;margin-bottom:4px;transition:.12s;position:relative}
.sig:hover{background:var(--panel2)}
.sig .bar{width:3px;align-self:stretch;border-radius:3px;background:var(--c,#4fc3f7);flex-shrink:0}
.sig-main{flex:1;min-width:0}
.sig-top{display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.sym{font-size:11px;font-weight:700;padding:2px 7px;border-radius:5px;color:var(--c,#4fc3f7);background:color-mix(in srgb,var(--c,#4fc3f7) 16%,transparent)}
.action{font-weight:700;padding:2px 7px;border-radius:5px;font-size:10px;letter-spacing:.3px}
.action.open{background:rgba(52,211,153,.16);color:var(--green)}
.action.close{background:rgba(248,113,113,.16);color:var(--red)}
.action.skip{background:#2a2f3a;color:var(--muted)}
.sig-pat{font-size:12px;color:#c4c9d2;font-weight:600}
.sig-setup{font-size:11.5px;color:#aeb4c0;margin-top:3px;line-height:1.4}
.sig-setup .lab{color:var(--accent);font-weight:600}
.sig-sub{font-size:11px;color:var(--muted);margin-top:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pnl{font-weight:700;font-size:13px;flex-shrink:0}
.pnl.pos{color:var(--green)} .pnl.neg{color:var(--red)}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:#565d6a;gap:10px;text-align:center;padding:30px}
.empty svg{opacity:.4}

/* ===== Pulsante fluttuante (FAB) ===== */
.fab{position:fixed;right:24px;bottom:24px;right:max(24px,env(safe-area-inset-right));bottom:max(24px,env(safe-area-inset-bottom));
  width:60px;height:60px;border-radius:50%;border:none;background:var(--accent);color:#0a0e18;cursor:pointer;
  box-shadow:0 10px 28px rgba(203,166,92,.45);z-index:30;display:flex;align-items:center;justify-content:center;transition:.2s}
.fab:hover{transform:scale(1.06)}
.fab.hidden{opacity:0;pointer-events:none;transform:scale(.7)}

/* ===== Drawer chat ===== */
.drawer-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);opacity:0;pointer-events:none;transition:.25s;z-index:40}
.drawer-overlay.open{opacity:1;pointer-events:auto}
.drawer{position:fixed;top:0;right:0;height:100vh;height:100dvh;width:440px;max-width:100vw;background:var(--panel);
  border-left:1px solid var(--border);display:flex;flex-direction:column;transform:translateX(105%);
  transition:transform .3s cubic-bezier(.4,0,.2,1);z-index:50;box-shadow:-14px 0 44px rgba(0,0,0,.5)}
.drawer.open{transform:none}
.drawer.left{right:auto;left:0;border-left:none;border-right:1px solid var(--border);transform:translateX(-105%);box-shadow:14px 0 44px rgba(0,0,0,.5)}
.drawer.left.open{transform:none}
.hdr-btn{display:flex;align-items:center;gap:6px;padding:7px 13px;border-radius:8px;border:1px solid var(--border);background:#1a2236;color:var(--text);font-size:13px;font-weight:600;cursor:pointer;flex-shrink:0;transition:.15s}
.hdr-btn:hover{border-color:var(--accent);color:var(--accent)}
/* Storico */
.st-body{flex:1;overflow-y:auto;padding:12px;-webkit-overflow-scrolling:touch}
.st-tot{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.st-tot .c{background:var(--panel2);border:1px solid var(--border);border-radius:10px;padding:10px 12px}
.st-tot .l{font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted)}
.st-tot .v{font-size:18px;font-weight:700;margin-top:3px}
.acc-row{border:1px solid var(--border);border-radius:10px;margin-bottom:6px;overflow:hidden;background:var(--panel2)}
.acc-head{display:flex;align-items:center;gap:10px;padding:11px 13px;cursor:pointer}
.acc-head:hover{background:#222c44}
.acc-head .yr{font-weight:700;font-size:15px;min-width:54px}
.acc-head .meta{font-size:11px;color:var(--muted);flex:1}
.acc-head .pnl{font-weight:700;font-size:14px}
.acc-sub{padding:0 8px 8px}
.mn-row{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:8px;cursor:pointer;font-size:13px}
.mn-row:hover{background:#222c44}
.mn-row .nm{min-width:74px;color:var(--text);font-weight:600}
.mn-row .mt{flex:1;font-size:11px;color:var(--muted)}
.brk-lab{font-size:10px;letter-spacing:.6px;text-transform:uppercase;color:var(--muted);padding:9px 10px 3px;font-weight:700}
.mn-row.sym{cursor:default;background:#1a2236}
.mn-row.sym:hover{background:#1a2236}
.mn-row.sym .nm{color:#6fb1ff}
.tr-row{padding:6px 10px;font-size:11.5px;color:#aeb4c0;border-top:1px solid var(--border)}
.tr-row .pp{font-weight:700}
.pos{color:var(--green)} .neg{color:var(--red)}
/* Stato mercato */
.mk-head{margin-bottom:10px}
.mk-sym{font-size:20px;font-weight:800;letter-spacing:1px}
.mk-sub{font-size:11px;color:var(--muted);margin-top:2px}
.mk-chips{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:14px}
.mk-chip{font-size:11px;font-weight:600;padding:4px 9px;border-radius:7px;border:1px solid var(--border)}
.mk-chip.pos{color:var(--green);background:rgba(61,220,151,.10)}
.mk-chip.neg{color:var(--red);background:rgba(241,112,123,.10)}
.mk-table{width:100%;border-collapse:collapse;font-size:13px}
.mk-table th{text-align:left;font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);padding:6px 8px;border-bottom:1px solid var(--border)}
.mk-table td{padding:9px 8px;border-bottom:1px solid var(--border)}
.mk-table td.v{font-weight:700}
.mk-table td.mu{color:var(--muted)}
.lvl{font-size:11px;font-weight:600;padding:2px 8px;border-radius:6px;white-space:nowrap}
.lvl.alto{color:var(--accent);background:rgba(203,166,92,.14)}
.lvl.basso{color:#5ab0ff;background:rgba(90,176,255,.12)}
.lvl.media{color:var(--muted);background:#1a2236}
.drawer-head{display:flex;align-items:center;gap:10px;padding:14px 16px;padding-top:max(14px,env(safe-area-inset-top));border-bottom:1px solid var(--border)}
.drawer-title{flex:1;font-weight:700;font-size:15px}
.drawer-title .scope{color:var(--accent);font-weight:600}
.icon-btn{width:34px;height:34px;border-radius:9px;border:1px solid var(--border);background:#1a2236;color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.15s;flex-shrink:0}
.icon-btn:hover{background:#232d46;color:var(--text)}
.icon-btn.primary{background:var(--accent);border-color:var(--accent);color:#0a0e18}
/* cronologia */
.history{flex:1;overflow-y:auto;padding:8px;-webkit-overflow-scrolling:touch}
.hist-item{display:flex;align-items:center;gap:10px;padding:11px 12px;border-radius:10px;cursor:pointer;transition:.12s}
.hist-item:hover{background:var(--panel2)}
.hist-main{flex:1;min-width:0}
.hist-title{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hist-date{font-size:11px;color:var(--muted);margin-top:2px}
.hist-del{background:none;border:none;color:#566;cursor:pointer;font-size:15px;padding:4px;flex-shrink:0;border-radius:6px}
.hist-del:hover{color:var(--red);background:rgba(248,113,113,.12)}
.hist-empty{color:#565d6a;text-align:center;padding:40px 20px;font-size:13px}

/* ===== Tablet landscape ===== */
@media(max-width:1024px){
  .signals-panel{width:330px}
  .cards.account .card-val{font-size:20px}
}
/* ===== Tablet portrait & phone: impila, il body scorre ===== */
@media(max-width:860px){
  body{height:auto;min-height:100dvh;overflow-y:auto}
  header{position:sticky;top:0;z-index:20}
  .container{flex-direction:column;overflow:visible;height:auto;gap:12px}
  .panel{height:auto}
  .chat-panel{min-height:56dvh}
  .signals-panel{width:100%}
  .signal-list{max-height:62dvh}
  .cards{flex-wrap:wrap}
  .cards.account .card{flex:1 1 calc(33.333% - 8px)}
  .cards.stats-row .card{flex:1 1 calc(50% - 6px)}
  .input-bar input{font-size:16px}      /* >=16px: evita lo zoom automatico iOS */
  .tab{padding:9px 15px}                 /* target touch piu' ampi */
}
/* ===== Phone ===== */
@media(max-width:560px){
  header{flex-wrap:wrap;height:auto;gap:9px;padding:9px 12px}
  .brand{font-size:15px}
  .tabs{order:3;flex-basis:100%}
  .user{margin-left:auto}
  .user .email{display:none}
  .cards{padding:12px 12px 0;gap:8px}
  .cards.stats-row{padding-top:8px}
  .cards.account .card{flex:1 1 calc(50% - 4px)}
  .card-val{font-size:20px}
  .card.sm .card-val{font-size:17px}
  .container{padding:0 12px 12px}
  .msg{max-width:92%}
  .signal-list{max-height:none}
  .input-bar button{padding:12px 16px}
}
</style>
</head>
<body>
<header>
  <div class="brand"><img src="/static/logo-mark.png" class="brand-mark" alt="PHAI"><span class="brand-name">PHAI<i>TRADING</i></span></div>
  <div class="tabs" id="tabs"></div>
  <button class="hdr-btn" id="mercato-btn" onclick="openMercato()" data-i18n-title="market_title">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12h4l3-8 4 16 3-8h4"/></svg>
    <span data-i18n="market">Mercato</span>
  </button>
  <button class="hdr-btn" id="storico-btn" onclick="openStorico()" data-i18n-title="storico_title">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="6" y1="20" x2="6" y2="13"/><line x1="12" y1="20" x2="12" y2="7"/><line x1="18" y1="20" x2="18" y2="10"/></svg>
    <span data-i18n="history">Storico</span>
  </button>
  <div class="user">
    <select class="lang-sel" id="lang-sel" onchange="setLang(this.value)" aria-label="Lingua">
      <option value="it">🇮🇹 IT</option>
      <option value="en">🇬🇧 EN</option>
      <option value="fr">🇫🇷 FR</option>
      <option value="es">🇪🇸 ES</option>
    </select>
    <button class="install-btn" id="install-btn" hidden data-i18n="install">⤓ Installa</button>
    <button class="notif-btn" id="notif-btn" title="Attiva notifiche" onclick="toggleNotifications()" aria-label="Notifiche">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
    </button>
    <span class="email" id="user-email"></span>
    <span class="logout" onclick="logout()" data-i18n="logout">Esci</span>
  </div>
</header>

<div class="cards account">
  <div class="card"><div class="card-label" data-i18n="balance">Balance</div><div class="card-val" id="acc-balance">—</div></div>
  <div class="card"><div class="card-label" data-i18n="equity">Equity</div><div class="card-val" id="acc-equity">—</div></div>
  <div class="card"><div class="card-label" data-i18n="free_margin">Margine libero</div><div class="card-val" id="acc-free">—</div></div>
  <div class="card"><div class="card-label" data-i18n="margin_level">Livello margine</div><div class="card-val" id="acc-level">—</div></div>
  <div class="card"><div class="card-label" id="acc-pl-label" data-i18n="floating_pl">P/L flottante</div><div class="card-val" id="acc-pl">—</div></div>
</div>
<div class="cards stats-row">
  <div class="card sm"><div class="card-label" data-i18n="open_n">Aperte</div><div class="card-val accent" id="stat-open">0</div></div>

const $=id=>document.getElementById(id);

/* ===== i18n (IT/EN/FR/ES) ===== */
const I18N={
 it:{market:'Mercato',history:'Storico',install:'⤓ Installa',logout:'Esci',balance:'Balance',equity:'Equity',free_margin:'Margine libero',margin_level:'Livello margine',floating_pl:'P/L flottante',open_n:'Aperte',closed_n:'Chiuse',skip_n:'Skip',pnl_closed:'PnL chiuse (punti)',signals:'Segnali',all:'Tutti',assistant:'Assistente',chat_ph:"Chiedi qualcosa sull'EA…",send:'Invia',hist_title:'Cronologia',new_chat:'Nuova chat',close:'Chiudi',dictation:'Dettatura vocale',storico_title:'Storico backtest',market_title:'Stato mercato',loading:'Carico…',trades:'Trade',winrate:'Win rate',pnl_pts:'PnL punti',pnl_cur:'PnL valuta',feature:'Feature',current:'Attuale',average:'Media',percentile:'Percentile',no_bt:'Nessun dato di backtest ancora.',no_feat:'Nessuna feature di mercato.',no_conv:'Nessuna conversazione salvata.',start_chat:'Inizia a chattare per crearne una.',last_bar:'ultima barra',welcome:"Ciao! Chiedimi pattern, segnali e performance dell'EA. Usa <b>+</b> per una nuova conversazione e <b>☰</b> per la cronologia.",order_open:'Ordine aperto',order_close:'Ordine chiuso',notif_on:'Notifiche attive',notif_off:'Attiva notifiche',notif_on_msg:'Riceverai gli avvisi di apertura e chiusura ordini.',notif_off_msg:'Notifiche disattivate'},
 en:{market:'Market',history:'History',install:'⤓ Install',logout:'Log out',balance:'Balance',equity:'Equity',free_margin:'Free margin',margin_level:'Margin level',floating_pl:'Floating P/L',open_n:'Open',closed_n:'Closed',skip_n:'Skip',pnl_closed:'Closed PnL (points)',signals:'Signals',all:'All',assistant:'Assistant',chat_ph:'Ask about the EA…',send:'Send',hist_title:'History',new_chat:'New chat',close:'Close',dictation:'Voice dictation',storico_title:'Backtest history',market_title:'Market state',loading:'Loading…',trades:'Trades',winrate:'Win rate',pnl_pts:'PnL points',pnl_cur:'PnL currency',feature:'Feature',current:'Current',average:'Average',percentile:'Percentile',no_bt:'No backtest data yet.',no_feat:'No market features.',no_conv:'No saved conversations.',start_chat:'Start chatting to create one.',last_bar:'last bar',welcome:'Hi! Ask me about patterns, signals and EA performance. Use <b>+</b> for a new conversation and <b>☰</b> for history.',order_open:'Order opened',order_close:'Order closed',notif_on:'Notifications on',notif_off:'Enable notifications',notif_on_msg:"You'll get alerts on order open and close.",notif_off_msg:'Notifications disabled'},
 fr:{market:'Marché',history:'Historique',install:'⤓ Installer',logout:'Déconnexion',balance:'Balance',equity:'Equity',free_margin:'Marge libre',margin_level:'Niveau de marge',floating_pl:'P/L flottant',open_n:'Ouvertes',closed_n:'Fermées',skip_n:'Skip',pnl_closed:'PnL clôturé (points)',signals:'Signaux',all:'Tous',assistant:'Assistant',chat_ph:"Posez une question sur l'EA…",send:'Envoyer',hist_title:'Historique',new_chat:'Nouvelle conversation',close:'Fermer',dictation:'Dictée vocale',storico_title:'Historique backtest',market_title:'État du marché',loading:'Chargement…',trades:'Trades',winrate:'Taux de réussite',pnl_pts:'PnL points',pnl_cur:'PnL devise',feature:'Indicateur',current:'Actuel',average:'Moyenne',percentile:'Percentile',no_bt:'Aucune donnée de backtest.',no_feat:'Aucune feature de marché.',no_conv:'Aucune conversation enregistrée.',start_chat:'Commencez à discuter pour en créer une.',last_bar:'dernière barre',welcome:"Bonjour ! Posez-moi des questions sur les patterns, signaux et performances de l'EA. Utilisez <b>+</b> pour une nouvelle conversation et <b>☰</b> pour l'historique.",order_open:'Ordre ouvert',order_close:'Ordre fermé',notif_on:'Notifications activées',notif_off:'Activer les notifications',notif_on_msg:"Vous serez alerté à l'ouverture et la fermeture des ordres.",notif_off_msg:'Notifications désactivées'},
 es:{market:'Mercado',history:'Historial',install:'⤓ Instalar',logout:'Salir',balance:'Balance',equity:'Equity',free_margin:'Margen libre',margin_level:'Nivel de margen',floating_pl:'P/L flotante',open_n:'Abiertas',closed_n:'Cerradas',skip_n:'Skip',pnl_closed:'PnL cerrado (puntos)',signals:'Señales',all:'Todos',assistant:'Asistente',chat_ph:'Pregunta sobre el EA…',send:'Enviar',hist_title:'Historial',new_chat:'Nuevo chat',close:'Cerrar',dictation:'Dictado por voz',storico_title:'Historial de backtest',market_title:'Estado del mercado',loading:'Cargando…',trades:'Operaciones',winrate:'Tasa de acierto',pnl_pts:'PnL puntos',pnl_cur:'PnL divisa',feature:'Indicador',current:'Actual',average:'Media',percentile:'Percentil',no_bt:'Aún no hay datos de backtest.',no_feat:'Sin features de mercado.',no_conv:'Sin conversaciones guardadas.',start_chat:'Empieza a chatear para crear una.',last_bar:'última barra',welcome:'¡Hola! Pregúntame sobre patrones, señales y rendimiento del EA. Usa <b>+</b> para una nueva conversación y <b>☰</b> para el historial.',order_open:'Orden abierta',order_close:'Orden cerrada',notif_on:'Notificaciones activas',notif_off:'Activar notificaciones',notif_on_msg:'Recibirás avisos de apertura y cierre de órdenes.',notif_off_msg:'Notificaciones desactivadas'}
};
const MONTHS_I18N={
 it:['','Gennaio','Febbraio','Marzo','Aprile','Maggio','Giugno','Luglio','Agosto','Settembre','Ottobre','Novembre','Dicembre'],
 en:['','January','February','March','April','May','June','July','August','September','October','November','December'],
 fr:['','Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'],
 es:['','Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre']
};
let lang=localStorage.getItem('lang')||((navigator.language||'it').slice(0,2));
if(!I18N[lang]) lang='it';
function t(k){return (I18N[lang]&&I18N[lang][k])||I18N.it[k]||k;}
const ASK_ON={it:'Chiedi su',en:'Ask about',fr:'Question sur',es:'Pregunta sobre'};
function applyI18n(){
  document.querySelectorAll('[data-i18n]').forEach(e=>e.textContent=t(e.getAttribute('data-i18n')));
  document.querySelectorAll('[data-i18n-ph]').forEach(e=>e.placeholder=t(e.getAttribute('data-i18n-ph')));
  document.querySelectorAll('[data-i18n-title]').forEach(e=>e.title=t(e.getAttribute('data-i18n-title')));
  document.documentElement.lang=lang;
}
function welcomeHtml(){return '<div class="msg bot"><span class="who">PHAI Assistant</span>'+t('welcome')+'</div>';}
function setLang(l){
  if(!I18N[l])return; lang=l; localStorage.setItem('lang',l);
  applyI18n(); renderTabs();
  const sc=activeSymbol?('· '+activeSymbol):('· '+t('all')); $('sig-scope').textContent=sc;
  chatInput.placeholder=activeSymbol?(ASK_ON[lang]+' '+activeSymbol+'…'):t('chat_ph');
  if(currentConvId===null) chatMsg.innerHTML=welcomeHtml();
  updatePLCard&&updatePLCard();
  loadRecent&&loadRecent();  // ritraduce i segnali già mostrati
  if(stDrawer&&stDrawer.classList.contains('open'))loadStorico();
  if(mkDrawer&&mkDrawer.classList.contains('open'))loadMercato();
  if($('history-view')&&!$('history-view').hidden)loadConversations();
}

/* traduzione dei codici neutri dei segnali (SETUP|… e R|…) scritti dall'EA */
const SIG_I18N={
 it:{entry:'Ingresso',exit:'Uscita',dyn:'dinamico',trail:'+trail',manual:'gestione manuale',r_tp:'TP raggiunto',r_sl:'SL colpito',r_stopout:'Chiusura forzata',r_exit:'Uscita su cross',r_sldyn:'SL dinamico toccato',skip_perpat:'Limite per-pattern raggiunto',skip_spread:'Spread troppo alto',skip_slunplace:'SL non piazzabile',skip_riskdist:'Distanza di rischio troppo piccola'},
 en:{entry:'Entry',exit:'Exit',dyn:'dynamic',trail:'+trail',manual:'manual management',r_tp:'TP hit',r_sl:'SL hit',r_stopout:'Forced close',r_exit:'Exit on cross',r_sldyn:'Dynamic SL hit',skip_perpat:'Per-pattern limit reached',skip_spread:'Spread too high',skip_slunplace:'SL not placeable',skip_riskdist:'Risk distance too small'},
 fr:{entry:'Entrée',exit:'Sortie',dyn:'dynamique',trail:'+trail',manual:'gestion manuelle',r_tp:'TP atteint',r_sl:'SL touché',r_stopout:'Clôture forcée',r_exit:'Sortie au cross',r_sldyn:'SL dynamique touché',skip_perpat:'Limite par pattern atteinte',skip_spread:'Spread trop élevé',skip_slunplace:'SL non plaçable',skip_riskdist:'Distance de risque trop faible'},
 es:{entry:'Entrada',exit:'Salida',dyn:'dinámico',trail:'+trail',manual:'gestión manual',r_tp:'TP alcanzado',r_sl:'SL alcanzado',r_stopout:'Cierre forzado',r_exit:'Salida en cross',r_sldyn:'SL dinámico alcanzado',skip_perpat:'Límite por patrón alcanzado',skip_spread:'Spread demasiado alto',skip_slunplace:'SL no colocable',skip_riskdist:'Distancia de riesgo muy pequeña'}
};
function ts(k){return (SIG_I18N[lang]&&SIG_I18N[lang][k])||SIG_I18N.it[k]||k;}
function maName(n){n=parseInt(n,10);return isNaN(n)?'?':(n===0?'Median':'MA'+n);}
function dirName(d){return (d==1||d==='1')?'BUY':'SELL';}
function reasonLines(reason){
  if(!reason) return [];
  if(reason.indexOf('SETUP|')===0){
    const kv={}; reason.slice(6).split('|').forEach(p=>{const i=p.indexOf(':');kv[p.slice(0,i)]=p.slice(i+1);});
    const out=[];
    if(kv.x) out.push('cross '+maName(kv.x)+(kv.tr?' '+ts('trail'):''));
    if(kv.sl) out.push('SL '+maName(kv.sl)+' '+ts('dyn'));
    else if(kv.sp) out.push('SL '+kv.sp+'pip');
    if(kv.tp) out.push('TP '+kv.tp+'pt');
    return [
      {label:ts('entry'), text:'cross '+maName(kv.e)+' '+dirName(kv.d)},
      {label:ts('exit'), text: out.length?out.join(', '):ts('manual')}
    ];
  }
  if(reason.indexOf('R|')===0){
    const c=reason.slice(2), i=c.indexOf(':'), code=i<0?c:c.slice(0,i), param=i<0?'':c.slice(i+1);
    let txt;
    if(code==='tp')txt=ts('r_tp'); else if(code==='sl')txt=ts('r_sl'); else if(code==='stopout')txt=ts('r_stopout');
    else if(code==='exit')txt=ts('r_exit')+' '+maName(param);
    else if(code==='sldyn')txt=ts('r_sldyn')+' ('+maName(param)+')';
    else if(code==='skip_perpat')txt=ts('skip_perpat'); else if(code==='skip_spread')txt=ts('skip_spread');
    else if(code==='skip_slunplace')txt=ts('skip_slunplace')+' ('+maName(param)+')'; else if(code==='skip_riskdist')txt=ts('skip_riskdist');
    else txt=code;
    return [{label:null, text:txt}];
  }
  return reason.split('|').map(s=>({label:null,text:s.trim()})).filter(x=>x.text);  // legacy italiano
}

const chatMsg=$('chat-messages'), chatInput=$('chat-input'), chatBtn=$('chat-btn'), signalList=$('signal-list');
let activeSymbol='';            // '' = tutti
let knownSymbols=[];
let accountData={symbols:[]};
let ws=null;

function fmtMoney(v){return v==null?'—':Number(v).toLocaleString('it-IT',{minimumFractionDigits:2,maximumFractionDigits:2});}
function fmtPct(v){return (v>=0?'+':'')+Number(v).toFixed(2)+'%';}

// colore stabile per simbolo: palette curata per indice, distinta e leggibile su scuro
const SYM_PALETTE=['#5ab0ff','#a78bfa','#34d399','#ec4899','#f97316','#22d3ee','#818cf8','#14b8a6'];
function symColor(sym){
  if(!sym) return '#4fc3f7';
  const i=knownSymbols.indexOf(sym);
  if(i>=0) return SYM_PALETTE[i%SYM_PALETTE.length];
  let h=0; for(const c of sym) h=(h*31+c.charCodeAt(0))>>>0;  // fallback simboli non ancora noti
  return `hsl(${(h*137)%360} 68% 62%)`;
}
function fmtTime(iso){
  if(!iso) return ''; const d=new Date(iso);
  return isNaN(d)?'':d.toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit'});
}

/* ---------- Tabs simboli ---------- */
async function loadSymbols(){
  try{
    const r=await fetch('/api/symbols'); if(r.status===401){location.href='/';return;}
    knownSymbols=await r.json();
  }catch(_){ knownSymbols=[]; }
  renderTabs();
}
function renderTabs(){
  const tabs=$('tabs'); tabs.innerHTML='';
  const mk=(label,val)=>{
    const t=document.createElement('div'); t.className='tab'+(val===activeSymbol?' active':'');
    if(val){const d=document.createElement('span');d.className='tdot';d.style.color=symColor(val);t.appendChild(d);}
    t.appendChild(document.createTextNode(label));
    if(val){
      const s=(accountData.symbols||[]).find(x=>x.symbol===val);
      if(s && s.pct!=null){const p=document.createElement('span');p.className='pct '+(s.pct>=0?'pos':'neg');p.textContent=fmtPct(s.pct);t.appendChild(p);}
    }
    t.onclick=()=>setSymbol(val); tabs.appendChild(t);
  };
  mk(t('all'),'');
  knownSymbols.forEach(s=>mk(s,s));
}
function setSymbol(sym){
  activeSymbol=sym; renderTabs();
  const label=sym||t('all');
  $('sig-scope').textContent='· '+label;
  $('chat-scope').textContent=sym?('· '+sym):'';
  chatInput.placeholder=sym?(ASK_ON[lang]+' '+sym+'…'):t('chat_ph');
  loadRecent(); refreshStats(); updatePLCard();
}

/* ---------- Conto (balance/equity/margine) + P/L per simbolo ---------- */
async function refreshAccount(){
  const r=await fetch('/api/account'); if(r.status===401){location.href='/';return;}
  const a=await r.json(); accountData=a;
  if(!a.available){
    ['acc-balance','acc-equity','acc-free','acc-level','acc-pl'].forEach(id=>{$(id).textContent='—';$(id).className='card-val';});
  }else{
    $('acc-balance').textContent=fmtMoney(a.balance);
    $('acc-equity').textContent=fmtMoney(a.equity);
    $('acc-free').textContent=fmtMoney(a.free_margin);
    $('acc-level').textContent=a.margin_level!=null?(Number(a.margin_level).toFixed(0)+'%'):'—';
    updatePLCard();
  }
  renderTabs();
}
function updatePLCard(){
  const pl=$('acc-pl'), lab=$('acc-pl-label'); if(!pl) return;
  if(activeSymbol){
    const s=(accountData.symbols||[]).find(x=>x.symbol===activeSymbol);
    lab.textContent='P/L '+activeSymbol;
    if(s && s.profit!=null){pl.textContent=fmtMoney(s.profit)+'  ('+fmtPct(s.pct||0)+')';pl.className='card-val '+(s.profit>=0?'pos':'neg');}
    else{pl.textContent='—';pl.className='card-val';}
  }else{
    lab.textContent=t('floating_pl');
    const v=accountData.profit;
    pl.textContent=v==null?'—':fmtMoney(v); pl.className='card-val '+(v>0?'pos':v<0?'neg':'');
  }
}

/* ---------- Stats ---------- */
async function refreshStats(){
  const q=activeSymbol?('?symbol='+encodeURIComponent(activeSymbol)):'';
  const r=await fetch('/api/stats'+q); if(r.status===401){location.href='/';return;}
  const s=await r.json();
  $('stat-open').textContent=s.open||0;
  $('stat-close').textContent=s.close||0;
  $('stat-skip').textContent=s.skip||0;
  const pnl=$('stat-pnl'); const v=s.pnl_pt||0;
  pnl.textContent=(v>=0?'+':'')+v; pnl.className='card-val '+(v>0?'pos':v<0?'neg':'');
}

/* ---------- Segnali ---------- */
function renderSignal(d){
  const c=symColor(d.symbol);
  const row=document.createElement('div'); row.className='sig'; row.style.setProperty('--c',c);
  const bar=document.createElement('div'); bar.className='bar'; row.appendChild(bar);

  const main=document.createElement('div'); main.className='sig-main';
  const top=document.createElement('div'); top.className='sig-top';
  if(d.symbol){const sy=document.createElement('span');sy.className='sym';sy.textContent=d.symbol;top.appendChild(sy);}
  const ac=document.createElement('span'); ac.className='action '+d.action; ac.textContent=(d.action||'').toUpperCase(); top.appendChild(ac);
  const pat=document.createElement('span'); pat.className='sig-pat'; pat.textContent='P'+(d.pattern??'?')+' '+(d.dir||''); top.appendChild(pat);
  main.appendChild(top);

  // Riga "perché e come": all'apertura il setup (ingresso + piano d'uscita),
  // alla chiusura il motivo d'uscita, allo skip la causa. Sempre visibile.
  if(d.reason){
    reasonLines(d.reason).forEach(ln=>{
      const sd=document.createElement('div'); sd.className='sig-setup';
      if(ln.label){
        const lab=document.createElement('span'); lab.className='lab'; lab.textContent=ln.label+': ';
        sd.appendChild(lab); sd.appendChild(document.createTextNode(ln.text));
      } else sd.textContent=ln.text;
      main.appendChild(sd);
    });
  }
  // Riga livelli: prezzo entrata + SL/TP reali + ora.
  const sub=document.createElement('div'); sub.className='sig-sub';
  let st=[];
  if(d.entry) st.push('@'+d.entry.toFixed(5));
  if(d.sl) st.push('SL '+d.sl.toFixed(5));
  if(d.tp) st.push('TP '+d.tp.toFixed(5));
  const tm=fmtTime(d.t); if(tm) st.push(tm);
  sub.textContent=st.join(' · '); main.appendChild(sub);
  row.appendChild(main);

  if(d.pnl_pt!=null){
    const p=document.createElement('div'); p.className='pnl '+(d.pnl_pt>=0?'pos':'neg');
    p.textContent=(d.pnl_pt>=0?'+':'')+d.pnl_pt.toFixed(1); row.appendChild(p);
  }
  return row;
}
function showEmpty(){
  signalList.innerHTML='';
  const e=document.createElement('div'); e.className='empty';

/* ---------- WebSocket ---------- */
function connectWS(){
  ws=new WebSocket((location.protocol==='https:'?'wss':'ws')+'://'+location.host+'/ws');
  ws.onclose=()=>setTimeout(connectWS,3000);
  ws.onmessage=e=>{
    let d; try{d=JSON.parse(e.data)}catch(_){return;}
    if(d.symbol && !knownSymbols.includes(d.symbol)){knownSymbols.push(d.symbol);knownSymbols.sort();renderTabs();}
    if(!activeSymbol || d.symbol===activeSymbol){
      const empty=signalList.querySelector('.empty'); if(empty)signalList.innerHTML='';
      signalList.insertBefore(renderSignal(d),signalList.firstChild);
      while(signalList.children.length>200)signalList.lastChild.remove();
    }
    // toast in-app immediato su apertura/chiusura
    if(d.action==='open'||d.action==='close'){
      const head=(d.symbol?d.symbol+' ':'')+'P'+(d.pattern??'?')+' '+(d.dir||'');
      if(d.action==='open'){ toast('🟢 '+t('order_open'), head+(d.entry?(' @'+d.entry.toFixed(5)):''), getComputedStyle(document.body).getPropertyValue('--green')); }
      else{ const neg=d.pnl_pt!=null&&d.pnl_pt<0; toast((neg?'🔴':'🟢')+' '+t('order_close'), head+(d.pnl_pt!=null?(' · PnL '+(d.pnl_pt>=0?'+':'')+d.pnl_pt.toFixed(1)+'pt'):''), getComputedStyle(document.body).getPropertyValue(neg?'--red':'--green')); }
      refreshAccount();
    }
    refreshStats();
  };
}

/* ---------- Chat ---------- */
chatBtn.onclick=async()=>{
  if(window.stopDictation)window.stopDictation();
  const q=chatInput.value.trim(); if(!q)return;
  chatBtn.disabled=true; chatInput.value='';
  addUserMsg(q);
  const bot=addBotMsg(); bot.innerHTML='<span class="who">PHAI Assistant</span><span class="typing"><i></i><i></i><i></i></span>';
  try{
    const convId=await ensureConversation();
    const r=await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({question:q,symbol:activeSymbol,conversation_id:convId,lang:lang})});
    const reader=r.body.getReader(); const dec=new TextDecoder(); let text=''; let buf='';
    while(true){
      const {done,value}=await reader.read(); if(done)break;
      buf+=dec.decode(value,{stream:true});
      const lines=buf.split('\n'); buf=lines.pop();   // ultima riga forse incompleta: la tengo
      for(const line of lines){
        if(!line.startsWith('data: '))continue;
        const data=line.slice(6); if(data==='__DONE__'){buf='';break;}
        try{const o=JSON.parse(data); if(o.delta!=null)text+=o.delta; else if(o.text!=null)text=o.text;}catch(_){text+=data}
        bot.innerHTML='<span class="who">PHAI Assistant</span>'+renderMarkdown(text);
        chatMsg.scrollTop=chatMsg.scrollHeight;
      }
    }
  }catch(e){ bot.innerHTML='<span class="who">PHAI Assistant</span>Errore: '+e.message; }
  chatBtn.disabled=false; chatInput.focus();
};

/* ---------- Dettatura vocale (Web Speech API): trascrive nel campo, NON invia ---------- */
(function(){
  const micBtn=$('mic-btn'); if(!micBtn) return;
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){ micBtn.style.display='none'; return; }   // browser non supportato
  const recog=new SR(); recog.lang='it-IT'; recog.continuous=true; recog.interimResults=true;
  let recording=false, baseText='', stopping=false;
  function render(interim){ chatInput.value=(baseText+(interim?(' '+interim):'')).replace(/\s+/g,' ').trimStart(); }
  recog.onresult=e=>{
    let fin='',interim='';
    for(let i=e.resultIndex;i<e.results.length;i++){
      const t=e.results[i][0].transcript;
      if(e.results[i].isFinal) fin+=t; else interim+=t;
    }
    if(fin) baseText=(baseText?baseText+' ':'')+fin.trim();
    render(interim);
  };
  recog.onend=()=>{ if(recording && !stopping){ try{recog.start();}catch(_){} } else { recording=false; micBtn.classList.remove('rec'); } };
  recog.onerror=ev=>{ if(ev.error==='not-allowed'||ev.error==='service-not-allowed'){ stopping=true; recording=false; micBtn.classList.remove('rec'); alert('Permesso microfono negato. Abilitalo nelle impostazioni del browser per usare la dettatura.'); } };
  function stop(){ if(!recording)return; stopping=true; recording=false; micBtn.classList.remove('rec'); try{recog.stop();}catch(_){} }
  window.stopDictation=stop;
  micBtn.onclick=()=>{
    if(recording){ stop(); return; }
    baseText=chatInput.value.trim(); stopping=false; recording=true; micBtn.classList.add('rec');
    try{ recog.start(); }catch(_){}
    chatInput.focus();
  };
})();

/* ---------- Markdown (sicuro) ---------- */
function escapeHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function mdInline(t){return t.replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>').replace(/(^|[^*])\*([^*\s][^*]*)\*/g,'$1<em>$2</em>').replace(/`([^`]+)`/g,'<code>$1</code>');}
function mdCells(l){return l.replace(/^\s*\|/,'').replace(/\|\s*$/,'').split('|').map(c=>c.trim());}
function renderMarkdown(src){
  const lines=escapeHtml(src).split('\n'); let html='',i=0;
  while(i<lines.length){const line=lines[i];
    if(line.indexOf('|')>=0&&i+1<lines.length&&/^[\s:|\-]+$/.test(lines[i+1])&&lines[i+1].indexOf('-')>=0){
      const head=mdCells(line);i+=2;const rows=[];
      while(i<lines.length&&lines[i].indexOf('|')>=0){rows.push(mdCells(lines[i]));i++;}
      html+='<table><thead><tr>'+head.map(c=>'<th>'+mdInline(c)+'</th>').join('')+'</tr></thead><tbody>'+rows.map(r=>'<tr>'+r.map(c=>'<td>'+mdInline(c)+'</td>').join('')+'</tr>').join('')+'</tbody></table>';continue;}
    const h=line.match(/^(#{1,4})\s+(.*)$/); if(h){html+='<div class="md-h">'+mdInline(h[2])+'</div>';i++;continue;}
    if(/^\s*[-*]\s+/.test(line)){html+='<ul>';while(i<lines.length&&/^\s*[-*]\s+/.test(lines[i])){html+='<li>'+mdInline(lines[i].replace(/^\s*[-*]\s+/,''))+'</li>';i++;}html+='</ul>';continue;}
    if(/^\s*\d+\.\s+/.test(line)){html+='<ol>';while(i<lines.length&&/^\s*\d+\.\s+/.test(lines[i])){html+='<li>'+mdInline(lines[i].replace(/^\s*\d+\.\s+/,''))+'</li>';i++;}html+='</ol>';continue;}
    if(line.trim()===''){i++;continue;}
    const para=[];while(i<lines.length&&lines[i].trim()!==''&&!/^#{1,4}\s/.test(lines[i])&&!/^\s*[-*]\s+/.test(lines[i])&&!/^\s*\d+\.\s+/.test(lines[i])&&lines[i].indexOf('|')<0){para.push(lines[i]);i++;}
    if(para.length)html+='<p>'+para.map(mdInline).join('<br>')+'</p>';
  }
  return html;
}

/* ---------- Notifiche: toast in-app + Web Push ---------- */
function toast(title,body,color){
  let box=$('toasts'); if(!box){box=document.createElement('div');box.id='toasts';box.className='toasts';document.body.appendChild(box);}
  const t=document.createElement('div'); t.className='toast'; if(color)t.style.borderLeftColor=color;
  const a=document.createElement('div');a.className='tt';a.textContent=title;
  const b=document.createElement('div');b.className='tb';b.textContent=body||'';
  t.appendChild(a);t.appendChild(b);box.appendChild(t);
  setTimeout(()=>t.remove(),6500);
}
function urlB64ToUint8(s){const pad='='.repeat((4-s.length%4)%4);const b=(s+pad).replace(/-/g,'+').replace(/_/g,'/');const raw=atob(b);return Uint8Array.from([...raw].map(c=>c.charCodeAt(0)));}
function updateBell(on){const b=$('notif-btn'); if(!b)return; b.classList.toggle('on',on); b.title=on?t('notif_on'):t('notif_off');}
async function initPush(){
  const b=$('notif-btn'); if(!b)return;
  if(!('serviceWorker' in navigator)||!('PushManager' in window)||!('Notification' in window)){b.style.display='none';return;}
  try{ const reg=await navigator.serviceWorker.ready; const sub=await reg.pushManager.getSubscription(); updateBell(!!sub); }catch(_){}
}
async function toggleNotifications(){
  try{
    const reg=await navigator.serviceWorker.ready;
    let sub=await reg.pushManager.getSubscription();
    if(sub){ await fetch('/api/push/unsubscribe',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({endpoint:sub.endpoint})}); await sub.unsubscribe(); updateBell(false); toast(t('notif_off_msg'),''); return; }
    const perm=await Notification.requestPermission();
    if(perm!=='granted'){ toast('Permesso negato','Abilita le notifiche nelle impostazioni del browser.',getComputedStyle(document.body).getPropertyValue('--red')); return; }
    const {key}=await (await fetch('/api/push/key')).json();
    if(!key){ toast('Non disponibile','Chiave push non configurata.'); return; }
    sub=await reg.pushManager.subscribe({userVisibleOnly:true,applicationServerKey:urlB64ToUint8(key)});
    await fetch('/api/push/subscribe',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(sub)});
    updateBell(true); toast(t('notif_on'),t('notif_on_msg'));
  }catch(e){ toast('Errore notifiche', e.message||''); }
}
