# Reverse proxy nginx per PAPP EA Chat. Termina TLS e inoltra a uvicorn (127.0.0.1:8000).
# Supporta il WebSocket (/ws) e timeout lunghi per le risposte LLM.
#
# 1) Sostituisci papp.example.com con il tuo dominio (o vedi README per IP/self-signed).
# 2) Copia in /etc/nginx/sites-available/papp e abilita (vedi README).

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name papp.example.com;
    # certbot aggiunge qui il redirect a HTTPS; in mancanza, serve direttamente.
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;   # le risposte LLM possono richiedere fino a 2 min
        proxy_buffering off;       # streaming SSE della chat
    }
}

