# PAPP EA Chat — HTTPS self-signed su porta dedicata 8095 → app su 127.0.0.1:8090.
# Non interferisce con gli altri siti nginx (porta isolata, variabile map dedicata).
# Certificato self-signed: il browser mostrerà un avviso (accettabile per test).

map $http_upgrade $papp_conn_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 8095 ssl;
    listen [::]:8095 ssl;
    server_name 77.81.226.151;

    ssl_certificate     /etc/nginx/ssl/papp.crt;
    ssl_certificate_key /etc/nginx/ssl/papp.key;
    ssl_protocols       TLSv1.2 TLSv1.3;

    access_log /var/log/nginx/papp-access.log;
    error_log  /var/log/nginx/papp-error.log;

    location / {
        proxy_pass http://127.0.0.1:8090;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $papp_conn_upgrade;   # WebSocket /ws
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;   # risposte LLM fino a ~2 min
        proxy_buffering off;       # streaming SSE della chat
    }
}
